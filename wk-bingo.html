// ── Utilities ─────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,9);

function seededShuffle(arr, seed) {
  const a = [...arr]; let sv = seed;
  const r = () => { sv=(sv*1664525+1013904223)&0xffffffff; return(sv>>>0)/0xffffffff; };
  for (let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function makeCard(pool, color, sessionId, gridSize=4) {
  const size = gridSize * gridSize;
  const seed = [...(color+(sessionId||"x"))].reduce((a,c,i)=>a+c.charCodeAt(0)*(i+1),42);
  const rare   = pool.filter(e=>e.is_rare);
  const common = pool.filter(e=>!e.is_rare);
  const nRare  = Math.min(Math.floor(size/4), rare.length);
  const nCommon = size - nRare;
  const cPool  = common.length >= nCommon ? common : pool;
  const sc = seededShuffle(cPool, seed).slice(0, Math.min(nCommon, cPool.length));
  const sr = seededShuffle(rare,  seed*7).slice(0, nRare);
  let card = seededShuffle([...sc,...sr], seed*13);
  // pad if needed
  if (card.length < size) {
    const used = new Set(card.map(e=>e.id));
    for (const e of pool) { if (!used.has(e.id)){card.push(e);} if(card.length>=size)break; }
  }
  return card.slice(0, size);
}

function getLines(gs) { return gs===4 ? LINES4 : LINES3; }

function checkBingo(counts, gs) {
  const lines = getLines(gs);
  return lines.filter(line => line.every(i => (counts[i]||0) > 0));
}

function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

let _ac=null;
const getAC=()=>{if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch{}if(_ac?.state==="suspended")_ac.resume().catch(()=>{});return _ac;};
function tone(f,d,v=0.15,t="sine"){
  const c=getAC();if(!c)return;
  try{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    o.frequency.value=f;o.type=t;const n=c.currentTime;
    g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);
    o.start(n);o.stop(n+d);}catch{}
}

function useToasts(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,opts={})=>{
    const id=uid();
    setToasts(t=>[...t,{id,msg,...opts}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),opts.dur||3000);
  },[]);
  return{toasts,add};
}

  return <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#0a0a0a",maxWidth:480,margin:"0 auto"}}>

      <div style={{color:"#555",fontSize:13,textAlign:"center",marginBottom:32}}>Het ultieme WK voetbal drankspel</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>

          <div style={{fontSize:24,marginBottom:4}}>{s.icon}</div>
          <div style={{fontFamily:"Anton,Impact,sans-serif",fontSize:26,color:s.color}}>{s.value}</div>
          <div style={{fontSize:11,color:"#555"}}>{s.label}</div>
        </div>)}
      </div>

      {bestGame&&<div style={{background:"#131313",border:"1px solid var(--y)33",borderRadius:12,padding:"12px 14px",marginBottom:16}}>
        <div style={{fontSize:11,color:"var(--y)",fontWeight:700,marginBottom:4}}>🌟 BESTE POTJE</div>
        <div style={{fontWeight:700}}>{bestGame.wk_sessions?.match_name||"WK Sessie"}</div>
        <div style={{fontSize:12,color:"#555",marginTop:2}}>🍺 {bestGame.total_slok||0} slokken · {bestGame.bingo_lines?.length||0} bingo's</div>

      <div className="neon-lbl mb8">GESCHIEDENIS</div>
      {histLoading?<Spinner/>:history.length===0

        :history.map((h,i)=>{
          const sess=h.wk_sessions||{};

          const bingos=h.bingo_lines?.length||0;
          return <div key={i} style={{background:"#131313",border:"1px solid #1e1e1e",borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>

            <div style={{flex:1,minWidth:0}}>

      <div style={{background:"#131313",border:"1px solid #1e1e1e",borderRadius:14,padding:"16px",marginBottom:16}}>
        <div style={{fontSize:11,color:"#555",marginBottom:4,letterSpacing:1}}>INGELOGD ALS</div>
        <div style={{fontWeight:800,fontSize:16,color:"#fff",marginBottom:2}}>{displayName}</div>
        <div style={{fontSize:13,color:"#555"}}>{authUser?.email}</div>
        {isAdmin&&<div style={{display:"inline-block",background:"var(--p)22",border:"1px solid var(--p)55",borderRadius:8,padding:"3px 10px",fontSize:11,color:"var(--p)",fontWeight:700,marginTop:8}}>⚙️ Beheerder</div>}

      {/* Change password */}
      <div style={{background:"#131313",border:"1px solid #1e1e1e",borderRadius:14,padding:"16px",marginBottom:16}}>
        <div style={{fontWeight:700,marginBottom:12}}>🔑 Wachtwoord wijzigen</div>
        {!newPwMode?<>

        </>:<>
          <input className="inp" type="password" value={newPw} onChange={e=>setNewPw(e.target.value)}
            placeholder="Nieuw wachtwoord (min. 6 tekens)" style={{marginBottom:12}}/>
          {pwErr&&<div style={{color:"var(--r)",fontSize:12,marginBottom:8}}>{pwErr}</div>}
          <div className="row gap8">
            <button className="btn btn-ghost btn-sm" onClick={()=>{setNewPwMode(false);setNewPw("");setPwErr("");}}>Annuleren</button>
            <button className="btn btn-green" style={{flex:1}} onClick={changePassword} disabled={pwLoading||!newPw}>
              {pwLoading?"Bezig…":"Opslaan →"}
            </button>
          </div>
        </>}
      </div>

      {isAdmin&&<button className="btn btn-ghost btn-block" style={{marginBottom:10,color:"var(--p)",borderColor:"var(--p)33"}} onClick={onAdmin}>
        ⚙️ Beheerder Paneel
      </button>}

      <button className="btn btn-ghost btn-block" style={{color:"var(--r)",borderColor:"var(--r)33"}} onClick={onLogout}>
        Uitloggen
      </button>
    </div>}

    {/* Bottom navigation */}
    <div className="bottom-nav">
      <button className={`nav-btn${tab==="spelen"?" active":""}`} onClick={()=>setTab("spelen")}>
        <div className="nav-btn-icon">⚽</div><div className="nav-btn-lbl">Spelen</div>
      </button>
      <button className={`nav-btn${tab==="stats"?" active":""}`} onClick={()=>setTab("stats")}>
        <div className="nav-btn-icon">📊</div><div className="nav-btn-lbl">Statistieken</div>
      </button>
      <button className={`nav-btn${tab==="account"?" active":""}`} onClick={()=>setTab("account")}>
        <div className="nav-btn-icon">👤</div><div className="nav-btn-lbl">Account</div>
      </button>
    </div>
  </div>;
}

// ── AdminLogin ────────────────────────────────────────────────────────────────
function AdminLoginScreen({onBack,onSuccess,pwRecovery,onPwRecoveryDone}){
  const [tab,setTab]=useState(pwRecovery?"newpw":"login");
  const [email,setEmail]=useState(ADMIN_EMAIL);
  const [pass,setPass]=useState("");
  const [pass2,setPass2]=useState("");
  const [err,setErr]=useState("");
  const [info,setInfo]=useState("");
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    if(pwRecovery) setTab("newpw");
  },[pwRecovery]);

  async function login(){
    setLoading(true);setErr("");setInfo("");
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){setErr(error.message);setLoading(false);return;}
    if(data.user.email!==ADMIN_EMAIL){
      await sb.auth.signOut();
      setErr("Geen toegang: alleen de app-beheerder kan inloggen.");
      setLoading(false);return;
    }
    onSuccess(data.user);
  }

  async function resetPw(){
    setLoading(true);setErr("");setInfo("");
    const{error}=await sb.auth.resetPasswordForEmail(ADMIN_EMAIL,{
      redirectTo:window.location.origin+window.location.pathname
    });
    if(error){setErr(error.message);setLoading(false);return;}
    setInfo("📧 Wachtwoord-reset mail verstuurd naar "+ADMIN_EMAIL+". Klik de link in de mail.");
    setLoading(false);
  }

  async function setNewPw(){
    if(!pass||pass.length<6){setErr("Wachtwoord moet minimaal 6 tekens zijn");return;}
    if(pass!==pass2){setErr("Wachtwoorden komen niet overeen");return;}
    setLoading(true);setErr("");
    const{data,error}=await sb.auth.updateUser({password:pass});
    if(error){setErr("Kon wachtwoord niet opslaan: "+error.message+" — probeer opnieuw via 'Wachtwoord vergeten'.");setLoading(false);return;}
    // Sign out the recovery session so the user logs in fresh with the new password
    await sb.auth.signOut();
    onPwRecoveryDone?.();
    setInfo("✅ Wachtwoord opgeslagen! Log nu in met je nieuwe wachtwoord.");
    setTab("login");setPass("");setPass2("");
    setLoading(false);
  }

  return <div className="screen" style={{padding:"24px 20px"}}>
    <button className="btn btn-ghost btn-sm" style={{alignSelf:"flex-start",marginBottom:24}} onClick={onBack}>← Terug</button>
    <div className="anto" style={{fontSize:28,color:"var(--g)",marginBottom:4}}>⚙️ Admin Panel</div>
    <div style={{color:"#555",fontSize:13,marginBottom:20}}>App-beheerder: {ADMIN_EMAIL}</div>

    {/* Tabs */}
    {tab!=="newpw"&&<div className="tabs" style={{marginBottom:20}}>
      <button className={`tab${tab==="login"?" active":""}`} onClick={()=>{setTab("login");setErr("");setInfo("");}}>Inloggen</button>
      <button className={`tab${tab==="reset"?" active":""}`} onClick={()=>{setTab("reset");setErr("");setInfo("");}}>Wachtwoord vergeten</button>
    </div>}

    {/* Login */}
    {tab==="login"&&<>
      <div className="neon-lbl" style={{marginBottom:6}}>WACHTWOORD</div>
      <input className="inp" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
        style={{marginBottom:20}} onKeyDown={e=>e.key==="Enter"&&login()}/>
      {err&&<div style={{color:"var(--r)",fontSize:13,marginBottom:12}}>{err}</div>}
      {info&&<div style={{color:"var(--g)",fontSize:13,marginBottom:12}}>{info}</div>}
      <button className="btn btn-green btn-block" onClick={login} disabled={loading||!pass}>
        {loading?"Bezig…":"Inloggen →"}
      </button>
    </>}

    {/* Reset password */}
    {tab==="reset"&&<>
      <div style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:10,padding:12,fontSize:12,color:"#555",marginBottom:16}}>
        Er wordt een reset-link gestuurd naar <strong style={{color:"#fff"}}>{ADMIN_EMAIL}</strong>. Klik die link — daarna kun je hier een nieuw wachtwoord instellen.
      </div>
      {err&&<div style={{color:"var(--r)",fontSize:13,marginBottom:12}}>{err}</div>}
      {info&&<div style={{color:"var(--g)",fontSize:13,marginBottom:12}}>{info}</div>}
      <button className="btn btn-ghost btn-block" onClick={resetPw} disabled={loading}>
        {loading?"Mail versturen…":"📧 Reset-mail Versturen →"}
      </button>
    </>}

    {/* New password (after clicking reset link in email) */}
    {tab==="newpw"&&<>
      <div className="anto" style={{fontSize:20,color:"var(--y)",marginBottom:12}}>🔑 Nieuw Wachtwoord</div>
      <div className="neon-lbl" style={{marginBottom:6}}>NIEUW WACHTWOORD</div>
      <input className="inp" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Min. 6 tekens"
        style={{marginBottom:12}}/>
      <div className="neon-lbl" style={{marginBottom:6}}>BEVESTIG WACHTWOORD</div>
      <input className="inp" type="password" value={pass2} onChange={e=>setPass2(e.target.value)} placeholder="Herhaal wachtwoord"
        style={{marginBottom:20}} onKeyDown={e=>e.key==="Enter"&&setNewPw()}/>
      {err&&<div style={{color:"var(--r)",fontSize:13,marginBottom:12}}>{err}</div>}
      {info&&<div style={{color:"var(--g)",fontSize:13,marginBottom:12}}>{info}</div>}
      <button className="btn btn-green btn-block" onClick={setNewPw} disabled={loading||!pass||!pass2}>
        {loading?"Opslaan…":"Wachtwoord Opslaan →"}
      </button>
    </>}
  </div>;
}

// ── AdminPanel ────────────────────────────────────────────────────────────────
function AdminPanelScreen({user,onBack}){
  const [tab,setTab]=useState("vakjes");
  const [events,setEvents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [catFilter,setCatFilter]=useState("all");
  const [editEv,setEditEv]=useState(null); // vakje open in sheet
  const [saving,setSaving]=useState(false);
  const [sessions,setSessions]=useState([]);
  const [toast,setToast]=useState("");
  const [bulkSheet,setBulkSheet]=useState(false);
  const [bulkText,setBulkText]=useState("");
  const [bulkImporting,setBulkImporting]=useState(false);

  useEffect(()=>{loadEvents();},[]);
  useEffect(()=>{if(tab==="stats")loadStats();},[tab]);

  async function loadEvents(){
    setLoading(true);
    const{data}=await sb.from("wk_events").select("*").order("category").order("sort_order");
    setEvents(data||[]);setLoading(false);
  }
  async function loadStats(){
    const{data}=await sb.from("wk_sessions").select("*").order("created_at",{ascending:false}).limit(20);
    setSessions(data||[]);
  }

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2200);}

  const VALID_TYPES=Object.keys(SLOK_TYPES);
  const VALID_CATS=Object.keys(CATEGORIES);

  function parseBulkLine(line){
    const parts=line.split("|").map(s=>s.trim());
    const rawLabel=parts[0]||"";
    // Detect leading emoji: first "word" is emoji if it starts with a non-ASCII/non-letter char
    let emoji="⚽",label=rawLabel.trim();
    const firstWordEnd=rawLabel.search(/\s/);
    if(firstWordEnd>0){
      const firstWord=rawLabel.slice(0,firstWordEnd);
      if(firstWord.length>0&&/[^\w]/.test(firstWord[0])){
        emoji=firstWord;label=rawLabel.slice(firstWordEnd).trim();
      }
    }
    if(!label)return null;
    const slokRaw=parseInt(parts[1]);
    const slok=isNaN(slokRaw)?1:slokRaw;
    const typeRaw=(parts[2]||"").toLowerCase();
    const slok_type=VALID_TYPES.includes(typeRaw)?typeRaw:"slok";
    const catRaw=(parts[3]||"").toLowerCase().trim();
    const category=VALID_CATS.includes(catRaw)?catRaw:(catFilter!=="all"?catFilter:"veld");
    return{emoji,label,slok,slok_type,category,description:"",vibrate:false,is_rare:false,active:true,sort_order:99};
  }

  function getBulkPreview(){
    return bulkText.split("\n").map(l=>l.trim()).filter(Boolean).map(parseBulkLine).filter(Boolean);
  }

  async function doBulkImport(){
    const rows=getBulkPreview();
    if(!rows.length)return;
    setBulkImporting(true);
    await sb.from("wk_events").insert(rows);
    await loadEvents();
    setBulkImporting(false);
    setBulkSheet(false);
    setBulkText("");
    showToast(`✅ ${rows.length} vakjes toegevoegd`);
  }

  async function saveEdit(){
    if(!editEv)return;
    setSaving(true);
    await sb.from("wk_events").update({
      label:editEv.label,description:editEv.description,slok:editEv.slok,
      slok_type:editEv.slok_type,category:editEv.category,emoji:editEv.emoji,
      vibrate:editEv.vibrate,is_rare:editEv.is_rare,active:editEv.active,
      updated_at:new Date().toISOString()
    }).eq("id",editEv.id);
    setEvents(evs=>evs.map(e=>e.id===editEv.id?{...editEv}:e));
    setSaving(false);showToast("✅ Opgeslagen");setEditEv(null);
  }

  async function toggleActive(id,val,e){
    e.stopPropagation();
    await sb.from("wk_events").update({active:val}).eq("id",id);
    setEvents(evs=>evs.map(e=>e.id===id?{...e,active:val}:e));
  }

  const [confirmDelete,setConfirmDelete]=useState(false);
  async function deleteEvent(){
    if(!editEv)return;
    setConfirmDelete(true);
  }
  async function doDeleteEvent(){
    setConfirmDelete(false);
    await sb.from("wk_events").delete().eq("id",editEv.id);
    setEvents(evs=>evs.filter(e=>e.id!==editEv.id));
    setEditEv(null);showToast("🗑 Verwijderd");
  }

  async function addEvent(){
    const cat=catFilter==="all"?"veld":catFilter;
    const ev={label:"Nieuw vakje",description:"",slok:1,slok_type:"slok",
      category:cat,emoji:"⚽",vibrate:false,is_rare:false,active:true,sort_order:99};
    const{data}=await sb.from("wk_events").insert(ev).select().single();
    if(data){setEvents(evs=>[...evs,data]);setEditEv({...data});}
  }

  const filtered=(catFilter==="all"?events:events.filter(e=>e.category===catFilter));

  // colour per category
  const catColor={veld:"var(--g)",snel:"var(--b)",var:"var(--p)",trainer:"var(--y)",supporters:"var(--r)",commentator:"#fb923c",overig:"#888"};

  return <div className="screen" style={{background:"#0a0a0a"}}>
    {/* Header */}
    <div style={{padding:"16px 16px 0",flexShrink:0}}>
      <div className="row gap12" style={{marginBottom:12}}>
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← Terug</button>
        <div className="anto" style={{fontSize:22,color:"var(--g)",flex:1}}>⚙️ Admin</div>
        <div style={{fontSize:12,color:"#555"}}>{user?.email?.split("@")[0]}</div>
      </div>
      <div className="tabs" style={{marginBottom:12}}>
        {["vakjes","stats"].map(t=>(
          <button key={t} className={`tab${tab===t?" active":""}`} onClick={()=>setTab(t)}>
            {t==="vakjes"?"🃏 Vakjes":"📊 Statistieken"}
          </button>
        ))}
      </div>
    </div>

    <div style={{flex:1,overflow:"auto",padding:"0 16px 80px"}}>
    {tab==="vakjes"&&<>
      {/* Category filter + add button */}
      <div className="row gap8" style={{marginBottom:14,alignItems:"center"}}>
        <div className="scroll-x" style={{flex:1}}>
          <div style={{display:"flex",gap:6,paddingBottom:2}}>
            <button className={`tab${catFilter==="all"?" active":""}`} onClick={()=>setCatFilter("all")}
              style={{whiteSpace:"nowrap",fontSize:12}}>Alle ({events.length})</button>
            {Object.entries(CATEGORIES).map(([k,v])=>(
              <button key={k} className={`tab${catFilter===k?" active":""}`} onClick={()=>setCatFilter(k)}
                style={{whiteSpace:"nowrap",fontSize:12,borderColor:catFilter===k?catColor[k]:"transparent",color:catFilter===k?catColor[k]:undefined}}>
                {v.emoji||""} {v.lbl} ({events.filter(e=>e.category===k).length})
              </button>
            ))}
          </div>
        </div>
        <button onClick={()=>setBulkSheet(true)}
          style={{flexShrink:0,height:32,borderRadius:16,background:"#1a1a1a",border:"1px solid #333",
            color:"#aaa",fontSize:11,fontWeight:700,cursor:"pointer",padding:"0 10px",whiteSpace:"nowrap"}}>
          📋 Bulk
        </button>
        <button onClick={addEvent}
          style={{flexShrink:0,width:40,height:40,borderRadius:20,background:"var(--g)",border:"none",
            color:"#000",fontSize:22,fontWeight:900,cursor:"pointer",display:"flex",alignItems:"center",
            justifyContent:"center",lineHeight:1}}>+</button>
      </div>

      {/* Vakjes grid */}
      {loading?<Spinner/>:<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {filtered.map(ev=>{
          const cc=catColor[ev.category]||"#555";
          return <div key={ev.id} onClick={()=>setEditEv({...ev})}
            style={{background:"#131313",border:`1.5px solid ${ev.active?"#2a2a2a":"#1a1a1a"}`,borderRadius:14,
              padding:"12px 10px 10px",cursor:"pointer",position:"relative",
              opacity:ev.active?1:.45,transition:"border-color .15s,opacity .15s",
              display:"flex",flexDirection:"column",alignItems:"center",gap:6,minHeight:100}}
            onMouseOver={e=>e.currentTarget.style.borderColor=cc}
            onMouseOut={e=>e.currentTarget.style.borderColor=ev.active?"#2a2a2a":"#1a1a1a"}>
            {/* active toggle pill top-right */}
            <div onClick={e=>toggleActive(ev.id,!ev.active,e)}
              style={{position:"absolute",top:7,right:7,width:28,height:16,borderRadius:8,
                background:ev.active?"var(--g)":"#333",cursor:"pointer",transition:"background .15s",
                display:"flex",alignItems:"center",justifyContent:ev.active?"flex-end":"flex-start",padding:"0 3px"}}>
              <div style={{width:10,height:10,borderRadius:5,background:"#fff"}}/>
            </div>
            {/* rare badge */}
            {ev.is_rare&&<div style={{position:"absolute",top:7,left:7,fontSize:10,color:"var(--y)"}}>⭐</div>}
            <div style={{fontSize:32,lineHeight:1}}>{ev.emoji}</div>
            <div style={{fontSize:11,fontWeight:700,textAlign:"center",lineHeight:1.3,color:"#fff",
              overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
              {ev.label}
            </div>
            <div style={{fontSize:10,fontWeight:700,color:SLOK_TYPES[ev.slok_type]?.color||"var(--y)",marginTop:"auto"}}>
              {slokLabel(ev)}
            </div>
            <div style={{fontSize:9,color:cc,textTransform:"uppercase",letterSpacing:1}}>
              {CATEGORIES[ev.category]?.lbl||ev.category}
            </div>
          </div>;
        })}

        {/* Add new tile */}
        <div onClick={addEvent}

// ── CreateSession ─────────────────────────────────────────────────────────────
function CreateSessionScreen({onBack,onCreate,authUser}){
  const defaultName=authUser?.user_metadata?.display_name||authUser?.email?.split("@")[0]||"";
  const [name,setName]=useState("");
  const [match,setMatch]=useState("");
  const [teamA,setTeamA]=useState("");
  const [teamB,setTeamB]=useState("");
  const [gridSize,setGridSize]=useState(4);
  const [pwd,setPwd]=useState("");
  const [reqLogin,setReqLogin]=useState(false);
  const [water,setWater]=useState(15);
  const [mooi,setMooi]=useState(3);
  const [cats,setCats]=useState(["veld","snel","var","trainer","supporters"]);
  const [color,setColor]=useState("rood");
  const [avatar,setAvatar]=useState("⚽");
  const [myName,setMyName]=useState(defaultName);
  const [predQs,setPredQs]=useState([]);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [events,setEvents]=useState([]);
  const [evLoaded,setEvLoaded]=useState(false);

  useEffect(()=>{
    sb.from("wk_events").select("*").eq("active",true)
      .then(({data})=>{setEvents(data||[]);setEvLoaded(true);});
  },[]);

  function toggleCat(k){
    setCats(c=>c.includes(k)?c.filter(x=>x!==k):[...c,k]);
  }

  async function create(){
    if(!myName.trim()){setErr("Vul jouw naam in");return;}
    if(cats.length===0){setErr("Kies minimaal één categorie");return;}
    const pool=events.filter(e=>cats.includes(e.category));
    if(pool.length<gridSize*gridSize){
      setErr(`Niet genoeg vakjes (${pool.length}) voor een ${gridSize}×${gridSize} kaart. Kies meer categorieën.`);return;
    }
    setLoading(true);setErr("");
    const id=uid()+uid();
    const{data:sess,error:se}=await sb.from("wk_sessions").insert({
      id,name:name||"WK Sessie",match_name:match,categories:cats,
      grid_size:gridSize,require_login:reqLogin,password:pwd||"",
      status:"lobby",host_color:color,event_pool:pool,water_alarm:water,
      mooiste_goal_nr:mooi,predictions_config:predQs,predictions_correct:{},
      team_a:teamA.trim()||"Team A",team_b:teamB.trim()||"Team B"
    }).select().single();
    if(se){setErr(se.message);setLoading(false);return;}

    const card=makeCard(pool,color,id,gridSize);
    const counts=Array(gridSize*gridSize).fill(0);
    const{data:player,error:pe}=await sb.from("wk_players").insert({
      session_id:id,name:myName.trim(),color,avatar,card,counts,
      bingo_lines:[],total_slok:0,achievements:[],is_host:true,
      user_id:authUser?.id||null
    }).select().single();
    if(pe){setErr(pe.message);setLoading(false);return;}

    onCreate(sess,player);
  }

  return <div className="screen" style={{background:"#0a0a0a",padding:"0 0 env(safe-area-inset-bottom,16px)"}}>
    <div style={{padding:"16px 16px 0",borderBottom:"1px solid #1e1e1e",marginBottom:0}}>
      <div className="row gap12">
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← Terug</button>
        <div className="anto" style={{fontSize:22,color:"var(--g)"}}>Nieuwe Sessie</div>
      </div>
    </div>

    <div style={{flex:1,overflow:"auto",padding:"16px 16px 24px"}}>
      <div className="section">
        <div className="neon-lbl mb8">JOUW NAAM</div>
        <input className="inp" value={myName} onChange={e=>setMyName(e.target.value)} placeholder="Naam…"/>
      </div>

      <div className="section">
        <div className="neon-lbl mb8">JOUW KLEUR</div>
        <div className="color-grid">
          {Object.entries(COLORS).map(([k,c])=>(
            <div key={k} className={`color-opt${color===k?" selected":""}`}
              style={{background:c.a}} onClick={()=>setColor(k)} title={c.lbl}/>
          ))}
        </div>
      </div>

      <div className="section">
        <div className="neon-lbl mb8">AVATAR</div>
        <div className="avatar-grid">
          {AVATARS.map(a=>(
            <div key={a} className={`av-opt${avatar===a?" selected":""}`} onClick={()=>setAvatar(a)}>{a}</div>
          ))}
        </div>
      </div>

      <hr className="divider"/>

      <div className="section">
        <div className="neon-lbl mb8">SESSIENAAM (optioneel)</div>
        <input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder="Bijv. 'WK Avond bij Stefan'"/>
      </div>

      <div className="section">
        <div className="neon-lbl mb8">WEDSTRIJD (optioneel)</div>
        <input className="inp" value={match} onChange={e=>setMatch(e.target.value)} placeholder="Bijv. 🇳🇱 Nederland vs 🇧🇷 Brazilië"/>
      </div>

      <div className="section">
        <div className="neon-lbl mb8">KAARTGROOTTE</div>
        <div className="row gap8">
          {[3,4].map(g=>(
            <button key={g} className={`btn flex1${gridSize===g?" btn-green":" btn-ghost"}`} onClick={()=>setGridSize(g)}>
              {g}×{g} {g===3?"(snel)":"(standaard)"}
            </button>
          ))}
        </div>
      </div>

      <div className="section">
        <div className="neon-lbl mb8">CATEGORIEËN OP DE KAART</div>
        <div className="cat-grid">
          {Object.entries(CATEGORIES).map(([k,v])=>(
            <div key={k} className={`cat-opt${cats.includes(k)?" selected":""}`} onClick={()=>toggleCat(k)}>
              <div style={{fontWeight:700,fontSize:13}}>{v.lbl}</div>
              <div style={{fontSize:11,color:"#555",marginTop:2}}>
                {evLoaded?`${events.filter(e=>e.category===k&&e.active).length} vakjes`:v.desc}
              </div>
            </div>
          ))}
        </div>
      </div>

      <hr className="divider"/>

      <div className="section">
        <div className="row gap12" style={{marginBottom:12}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:14}}>Login verplicht</div>
            <div style={{fontSize:12,color:"#555"}}>Spelers moeten inloggen voor statistieken</div>
          </div>
          <Toggle checked={reqLogin} onChange={e=>setReqLogin(e.target.checked)}/>
        </div>
      </div>

      <div className="section">
        <div className="neon-lbl mb8">WATER ALARM (slokken)</div>
        <div className="row gap12">
          <input type="range" min={5} max={30} value={water} onChange={e=>setWater(+e.target.value)} style={{flex:1}}/>
          <span style={{fontWeight:800,color:"var(--g)",minWidth:30}}>{water}</span>
        </div>
        <div style={{fontSize:11,color:"#555",marginTop:4}}>
          Na {water} slokken krijgt een speler een watermelding 💧
        </div>
      </div>

      <div className="section">
        <div className="neon-lbl mb8">MOOISTE GOAL (voorspelling)</div>
        <div className="row gap12">
          <input type="range" min={1} max={6} value={mooi} onChange={e=>setMooi(+e.target.value)} style={{flex:1}}/>
          <span style={{fontWeight:800,color:"var(--y)",minWidth:60}}>Goal #{mooi}</span>
        </div>
        <div style={{fontSize:11,color:"#555",marginTop:4}}>
          Als host trigger je de Mooiste Goal bij de {mooi}e goal in de wedstrijd
        </div>
      </div>

      <div className="section">
        <div className="neon-lbl mb8">🔮 VOORSPELLINGSVRAGEN (optioneel, max 5)</div>
        <div style={{color:"#555",fontSize:12,marginBottom:10}}>Spelers vullen deze in vóór het spel. Selecteer 0–5 vragen.</div>

        {/* Team names — needed for "team" type questions */}
        <div className="row gap8" style={{marginBottom:12}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"#555",marginBottom:4}}>TEAM A (thuis)</div>

          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"#555",marginBottom:4}}>TEAM B (uit)</div>
            <input className="inp inp-sm" value={teamB} onChange={e=>setTeamB(e.target.value)} placeholder="bijv. Brazilië"/>
          </div>
        </div>

        {PREDICTION_QUESTIONS.map(q=>{
          const sel=predQs.includes(q.id);
          const isTeam=q.type==="team";
          return <div key={q.id}
            style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,cursor:"pointer",
              padding:"10px 12px",background:sel?"#0e1a0e":"transparent",
              border:sel?"1px solid var(--g)":"1px solid #2a2a2a",borderRadius:10}}

            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:sel?700:400,color:sel?"#fff":"#ccc"}}>{q.q}</div>
              <div style={{fontSize:11,color:"#555",marginTop:2}}>
                {q.type==="team"?`🏳️ ${teamA||"Team A"} / ${teamB||"Team B"} / Gelijkspel`
                 :q.type==="yesno"?"✅ Ja / Nee"

      </div>

      <div className="section">
        <div className="neon-lbl mb8">WACHTWOORD (optioneel)</div>
        <input className="inp" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Leeg = geen wachtwoord"/>
      </div>

      {err&&<div style={{color:"var(--r)",fontSize:13,marginBottom:12,padding:"10px 12px",background:"#1a0200",borderRadius:8}}>{err}</div>}

      <button className="btn btn-green btn-block safe-bottom" style={{fontSize:17,padding:"16px 20px"}} onClick={create} disabled={loading}>
        {loading?"Aanmaken…":"⚽ Sessie Aanmaken →"}

  </div>;
