// ── CardApproval ──────────────────────────────────────────────────────────────
function CardApprovalScreen({sess,players,allEvents,onDone}){
  const gs=sess.grid_size||4;
  const [currentIdx,setCurrentIdx]=useState(0);
  const [cards,setCards]=useState(()=>players.reduce((m,p)=>({...m,[p.id]:[...(p.card||[])]}),{}));
  const [approved,setApproved]=useState({});
  const [saving,setSaving]=useState({});
  const [replaceSheet,setReplaceSheet]=useState(null); // {playerId,cellIdx}
  const [search,setSearch]=useState("");
  const [touchStartX,setTouchStartX]=useState(null);

  const allApproved=players.every(p=>approved[p.id]);
  const approvedCount=Object.values(approved).filter(Boolean).length;
  const p=players[currentIdx]||players[0];
  const C=COLORS[p?.color]||COLORS.groen;
  const card=p?cards[p.id]||[]:[];

  const filtered=allEvents.filter(e=>!search||e.label.toLowerCase().includes(search.toLowerCase())||e.emoji?.includes(search));

  async function approveCard(player){
    setSaving(s=>({...s,[player.id]:true}));
    await sb.from("wk_players").update({card:cards[player.id],card_approved:true}).eq("id",player.id);
    setApproved(a=>({...a,[player.id]:true}));
    setSaving(s=>({...s,[player.id]:false}));
    const next=players.findIndex((pp,i)=>i>currentIdx&&!approved[pp.id]);
    if(next>=0)setCurrentIdx(next);
    else if(currentIdx<players.length-1)setCurrentIdx(i=>Math.min(i+1,players.length-1));
  }

  function replaceCell(ev){
    if(!replaceSheet)return;
    const{playerId,cellIdx}=replaceSheet;
    const newCard=[...(cards[playerId]||[])];
    newCard[cellIdx]=ev;
    setCards(c=>({...c,[playerId]:newCard}));
    setApproved(a=>({...a,[playerId]:false}));
    setReplaceSheet(null);
    setSearch("");
  }

  function onTouchStart(e){setTouchStartX(e.touches[0].clientX);}
  function onTouchEnd(e){
    if(touchStartX===null)return;
    const dx=touchStartX-e.changedTouches[0].clientX;
    if(Math.abs(dx)>50){
      if(dx>0&&currentIdx<players.length-1)setCurrentIdx(i=>i+1);
      else if(dx<0&&currentIdx>0)setCurrentIdx(i=>i-1);
    }
    setTouchStartX(null);
  }

  if(!p)return null;

  return <div className="screen" style={{background:"#0a0a0a"}}>
    {/* Header */}
    <div style={{padding:"16px 16px 12px",borderBottom:"1px solid #1e1e1e",flexShrink:0}}>
      <div className="row gap12" style={{marginBottom:10}}>
        <button className="btn btn-ghost btn-sm" onClick={onDone}>← Terug</button>
        <div style={{flex:1}}>
          <div className="anto" style={{fontSize:18,color:"var(--y)"}}>📋 Kaarten Keuren</div>
          <div style={{fontSize:11,color:"#555"}}>{approvedCount}/{players.length} goedgekeurd · swipe om te wisselen</div>
        </div>
      </div>
      {/* Nav dots */}
      <div style={{display:"flex",justifyContent:"center",gap:6}}>
        {players.map((pp,i)=>(
          <div key={pp.id} onClick={()=>setCurrentIdx(i)}
            style={{width:i===currentIdx?24:8,height:8,borderRadius:4,cursor:"pointer",transition:"all .2s",
              background:approved[pp.id]?"var(--g)":i===currentIdx?"var(--y)":"#333"}}/>
        ))}
      </div>
    </div>

    {/* Scrollable card area with swipe */}
    <div style={{flex:1,overflow:"auto",padding:"12px 16px 16px"}} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      {/* Player header row */}
      <div className="row gap10" style={{marginBottom:10}}>
        <PlayerAvatar p={p} size={36}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:16,color:C.a}}>{p.name}</div>
          <div style={{fontSize:11,color:"#555"}}>{COLORS[p.color]?.lbl}</div>
        </div>
        {currentIdx>0&&<button className="btn btn-ghost btn-sm" onClick={()=>setCurrentIdx(i=>i-1)}>‹</button>}
        {currentIdx<players.length-1&&<button className="btn btn-ghost btn-sm" onClick={()=>setCurrentIdx(i=>i+1)}>›</button>}
      </div>
      <div style={{fontSize:11,color:"#555",textAlign:"center",marginBottom:8}}>Tik op een vakje om het te vervangen</div>

      {/* Full-size bingo card */}
      <div className={`bingo-grid-${gs}`}>
        {card.map((ev,i)=>(
          <div key={(ev?.id||i)+"_"+i} className="cell"
            style={{background:C.cell,borderColor:ev?.is_rare?"var(--y)":C.bd,color:C.tx,cursor:"pointer"}}
            onClick={()=>setReplaceSheet({playerId:p.id,cellIdx:i})}>
            <div className="cell-emoji">{ev?.emoji||"⚽"}</div>
            <div className="cell-label">{ev?.label}</div>
            <div className="cell-slok" style={{color:slokColor(ev||{})}}>{slokLabel(ev||{slok:1,slok_type:"slok"})}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Bottom approve bar */}
    <div style={{padding:"12px 16px",borderTop:"1px solid #1e1e1e",flexShrink:0}}>
      {approved[p.id]
        ? <div style={{textAlign:"center",color:"var(--g)",fontWeight:700,padding:"12px 0"}}>✓ Goedgekeurd</div>
        : <button className="btn btn-green btn-block" onClick={()=>approveCard(p)} disabled={saving[p.id]}>
            {saving[p.id]?"Opslaan…":"✓ Kaart Goedkeuren"}
          </button>}
      {allApproved&&<button className="btn btn-gold btn-block" style={{marginTop:10,fontSize:16}} onClick={onDone}>
        ⚽ Start het Spel →
      </button>}
      {!allApproved&&<button className="btn btn-ghost btn-block btn-sm" style={{marginTop:8}} onClick={onDone}>
        Overslaan (start zonder keuring)
      </button>}
    </div>

    {/* Replace bottom sheet */}
    {replaceSheet&&(
      <div style={{position:"fixed",inset:0,zIndex:1000,background:"#000a",display:"flex",alignItems:"flex-end"}}
        onClick={()=>{setReplaceSheet(null);setSearch("");}}>
        <div style={{background:"#131313",borderRadius:"20px 20px 0 0",borderTop:"1px solid #2a2a2a",
          padding:"20px 16px 40px",width:"100%",maxWidth:480,margin:"0 auto",maxHeight:"75vh",display:"flex",flexDirection:"column"}}
          onClick={e=>e.stopPropagation()}>
          <div className="row gap10" style={{marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:16,flex:1}}>🔄 Vervang Vakje</div>
            <button onClick={()=>{setReplaceSheet(null);setSearch("");}} style={{background:"none",border:"none",color:"#555",fontSize:22,cursor:"pointer"}}>✕</button>
          </div>
          <input className="inp inp-sm" value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Zoek vakje…" style={{marginBottom:12}} autoFocus/>
          <div style={{flex:1,overflowY:"auto"}}>
            {filtered.map(ev=>(
              <div key={ev.id}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                  borderRadius:10,cursor:"pointer",marginBottom:4,background:"#1a1a1a"}}
                onClick={()=>replaceCell(ev)}>
                <span style={{fontSize:22}}>{ev.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>{ev.label}</div>
                  <div style={{fontSize:11,color:"#555"}}>{CATEGORIES[ev.category]?.lbl||ev.category}</div>
                </div>
                <span style={{fontSize:12,color:slokColor(ev),fontWeight:700}}>{slokLabel(ev)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    )}
  </div>;
}

// ── HostLobby ─────────────────────────────────────────────────────────────────
function HostLobbyScreen({sess,players,me,onStart,onUpdate,onEnd,addToast}){
  const [matchSheet,setMatchSheet]=useState(false);
  const [matchName,setMatchName]=useState(sess.match_name||"");
  const [matchScore,setMatchScore]=useState(sess.match_score||"");
  const [copied,setCopied]=useState(false);
  const [confirmClose,setConfirmClose]=useState(false);
  const [showApproval,setShowApproval]=useState(false);
  const [approvalPlayers,setApprovalPlayers]=useState([]);
  const [showPredictions,setShowPredictions]=useState(false);
  const [allEvents,setAllEvents]=useState([]);

  const url=`${location.origin}${location.pathname}?join=${sess.id}`;
  const code=sess.id.toUpperCase().slice(0,6);

  useEffect(()=>{
    sb.from("wk_events").select("*").eq("active",true).then(({data})=>setAllEvents(data||[]));
  },[]);

  function copy(){
    navigator.clipboard?.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  }
  async function saveMatch(){
    await sb.from("wk_sessions").update({match_name:matchName,match_score:matchScore}).eq("id",sess.id);
    onUpdate({...sess,match_name:matchName,match_score:matchScore});
    setMatchSheet(false);
    addToast("Wedstrijd info bijgewerkt","var(--g)");
  }
  async function startGame(){
    await sb.from("wk_sessions").update({status:"active"}).eq("id",sess.id);
    onStart();
  }
  async function endSess(){
    setConfirmClose(true);
  }
  async function doEndSess(){
    setConfirmClose(false);
    await sb.from("wk_sessions").update({status:"finished"}).eq("id",sess.id);
    onEnd();
  }

  if(showApproval) return <CardApprovalScreen
    sess={sess} players={approvalPlayers} allEvents={allEvents}
    onDone={()=>{setShowApproval(false);startGame();}}/>;

  if(showPredictions) return <PredictionsScreen sess={sess} player={me} onDone={()=>setShowPredictions(false)}/>;

  return <div className="screen" style={{background:"#0a0a0a",padding:"16px 16px 32px"}}>
    <div className="row gap12 mb16">
      <div className="anto" style={{fontSize:22,color:"var(--g)",flex:1}}>⚽ Lobby</div>
      <div className="sess-code"><span className="sess-code-lbl">CODE</span><span className="sess-code-val">{code}</span></div>
      <button className="btn btn-ghost btn-sm" style={{color:"var(--r)"}} onClick={endSess}>✕ Sluiten</button>
    </div>

    <div style={{background:"#131313",border:"1px solid #1e1e1e",borderRadius:16,padding:16,marginBottom:16,textAlign:"center"}}>
      <div className="code-big" style={{marginBottom:8}}>{code}</div>
      <div style={{fontSize:11,color:"#555",marginBottom:8,wordBreak:"break-all"}}>{url}</div>
      <button className="btn btn-ghost btn-sm" onClick={copy}>
        {copied?"✓ Gekopieerd!":"📋 Kopieer link"}
      </button>
    </div>

    <div style={{background:"#131313",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:16}}>
      <div className="row gap8 mb4">
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:13}}>{sess.match_name||"⚽ Wedstrijd niet ingesteld"}</div>
          {sess.match_score&&<div style={{color:"var(--y)",fontFamily:"Anton,Impact,sans-serif",fontSize:16,marginTop:2}}>{sess.match_score}</div>}
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setMatchSheet(true)}>✏️</button>
      </div>
    </div>

    <div className="neon-lbl mb8">SPELERS ({players.length})</div>
    {players.map(p=>(
      <div key={p.id} className="p-row">
        <PlayerAvatar p={p}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700}}>{p.name}</div>
          <div style={{fontSize:11,color:"#555"}}>{COLORS[p.color]?.lbl}</div>
        </div>
        {p.is_host?<span className="pill pill-gold">HOST</span>:<span className="pill pill-green">✓</span>}
      </div>
    ))}

    {players.length<2&&<div style={{fontSize:12,color:"#555",textAlign:"center",padding:"8px 0"}}>
      Wacht op spelers… deel de link hierboven
    </div>}

    <div style={{marginTop:20,display:"flex",flexDirection:"column",gap:10}}>
      {(sess.predictions_config||[]).length>0&&<button className="btn btn-ghost btn-block btn-sm"
        style={{borderColor:"var(--p)33",color:"var(--p)"}}
        onClick={()=>setShowPredictions(true)}>
        🔮 Mijn Voorspellingen Invullen
      </button>}
      <button className="btn btn-ghost btn-block"
        onClick={async()=>{
          const{data}=await sb.from("wk_players").select("*").eq("session_id",sess.id).eq("is_host",false);
          setApprovalPlayers(data||players.filter(p=>!p.is_host));
          setShowApproval(true);
        }}
        disabled={players.filter(p=>!p.is_host).length===0}
        style={{opacity:players.filter(p=>!p.is_host).length===0?.4:1}}>
        📋 Kaarten Keuren & Aanpassen
        {players.filter(p=>!p.is_host).length===0&&<span style={{fontSize:11,color:"#555",display:"block",marginTop:2}}>Wacht op spelers om kaarten te keuren</span>}
      </button>
      <button className="btn btn-gold btn-block" style={{fontSize:17,padding:"16px 20px"}}
        onClick={startGame} disabled={players.length<2}>
        {players.length<2?"Wacht op spelers…":"🏁 Start Spel →"}
      </button>
    </div>

    <Sheet open={matchSheet} onClose={()=>setMatchSheet(false)}>
      <div className="anto" style={{fontSize:20,marginBottom:16,color:"var(--g)"}}>📍 Wedstrijd Info</div>
      <div className="neon-lbl mb8">WEDSTRIJD</div>
      <input className="inp" value={matchName} onChange={e=>setMatchName(e.target.value)}
        placeholder="🇳🇱 Nederland vs 🇧🇷 Brazilië" style={{marginBottom:12}}/>
      <div className="neon-lbl mb8">STAND</div>
      <input className="inp" value={matchScore} onChange={e=>setMatchScore(e.target.value)}
        placeholder="0 - 0" style={{marginBottom:20}}/>
      <button className="btn btn-green btn-block" onClick={saveMatch}>Opslaan</button>
    </Sheet>

    <ConfirmDialog
      open={confirmClose}
      title="Lobby sluiten?"
      body="De sessie wordt beëindigd en alle spelers worden verwijderd. Weet je het zeker?"
      confirmLabel="✕ Ja, lobby sluiten"
      danger={true}
      onConfirm={doEndSess}
      onCancel={()=>setConfirmClose(false)}/>
  </div>;
}

// ── JoinScreen ────────────────────────────────────────────────────────────────
function JoinScreen({initCode,onBack,onFound}){
  const [code,setCode]=useState(initCode||"");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  async function find(){
    if(!code.trim()){setErr("Vul een code in");return;}
    setLoading(true);setErr("");
    const q=code.trim().toLowerCase();
    const{data,error}=await sb.from("wk_sessions").select("*")
      .or(`id.eq.${q},id.ilike.${q}%`).limit(1).single();
    if(error||!data){
      // try prefix search
      const{data:d2}=await sb.from("wk_sessions").select("*").ilike("id",q+"%").limit(1).single();
      if(!d2){setErr("Sessie niet gevonden. Controleer de code.");setLoading(false);return;}
      onFound(d2);
    } else {
      onFound(data);
    }
    setLoading(false);
  }

  return <div className="screen" style={{background:"#0a0a0a",padding:"24px 20px"}}>
    <button className="btn btn-ghost btn-sm" style={{alignSelf:"flex-start",marginBottom:24}} onClick={onBack}>← Terug</button>
    <div className="anto" style={{fontSize:28,color:"var(--g)",marginBottom:4}}>🎟️ Doe Mee</div>
    <div style={{color:"#555",fontSize:13,marginBottom:24}}>Voer de sessiecode in van de host</div>
    <input className="inp" value={code} onChange={e=>setCode(e.target.value.toUpperCase())}
      placeholder="CODE…" style={{textAlign:"center",letterSpacing:4,fontSize:22,marginBottom:12}}/>
    {err&&<div style={{color:"var(--r)",fontSize:13,marginBottom:12}}>{err}</div>}
    <button className="btn btn-green btn-block" onClick={find} disabled={loading||!code.trim()}>
      {loading?"Zoeken…":"Doorgaan →"}
    </button>
  </div>;
}

// ── PlayerSetup ───────────────────────────────────────────────────────────────
function PlayerSetupScreen({sess,onBack,onJoin,authUser}){
  const defaultName=authUser?.user_metadata?.display_name||authUser?.email?.split("@")[0]||"";
  const [name,setName]=useState(defaultName);
  const [color,setColor]=useState("blauw");
  const [avatar,setAvatar]=useState("⚽");
  const [pwd,setPwd]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  async function join(){
    if(!name.trim()){setErr("Vul je naam in");return;}
    if(sess.password&&sess.password!==pwd){setErr("Verkeerd wachtwoord");return;}
    setLoading(true);setErr("");

    const pool=sess.event_pool||[];
    const card=makeCard(pool,color,sess.id,sess.grid_size||4);
    const size=(sess.grid_size||4)*(sess.grid_size||4);
    const counts=Array(size).fill(0);

    const{data:player,error}=await sb.from("wk_players").insert({
      session_id:sess.id,name:name.trim(),color,avatar,card,counts,
      bingo_lines:[],total_slok:0,achievements:[],is_host:false,
      user_id:authUser?.id||null,predictions:{}
    }).select().single();

    if(error){
      setErr(error.message.includes("unique")?"Die kleur is al bezet, kies een andere":error.message);
      setLoading(false);return;
    }
    onJoin(player);
  }

  return <div className="screen" style={{background:"#0a0a0a",padding:"0 0 env(safe-area-inset-bottom,16px)"}}>
    <div style={{padding:"16px 16px 0"}}>
      <div className="row gap12">
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← Terug</button>
        <div>
          <div className="anto" style={{fontSize:20,color:"var(--g)"}}>{sess.name||"WK Sessie"}</div>
          {sess.match_name&&<div style={{fontSize:12,color:"#555"}}>{sess.match_name}</div>}
        </div>
      </div>
    </div>

    <div style={{flex:1,overflow:"auto",padding:"16px 16px 24px"}}>
      <div className="section">
        <div className="neon-lbl mb8">JOUW NAAM</div>
        <input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder="Naam…"/>
      </div>

      <div className="section">
        <div className="neon-lbl mb8">KLEUR</div>
        <div className="color-grid">
          {Object.entries(COLORS).map(([k,c])=>(
            <div key={k} className={`color-opt${color===k?" selected":""}`}
              style={{background:c.a}} onClick={()=>setColor(k)}/>
          ))}
        </div>
      </div>

      <div className="section">
        <div className="neon-lbl mb8">AVATAR</div>
        <div className="avatar-grid">
          {AVATARS.map(a=>(
            <div key={a} className={`av-opt${avatar===a?" selected":""}`} onClick={()=>setAvatar(a)}>{a}</div>
          ))}
        </div>
      </div>

      {sess.password&&<div className="section">
        <div className="neon-lbl mb8">WACHTWOORD</div>
        <input className="inp" type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="••••••••"/>
      </div>}

      {err&&<div style={{color:"var(--r)",fontSize:13,marginBottom:12,padding:"10px 12px",background:"#1a0200",borderRadius:8}}>{err}</div>}

      <button className="btn btn-green btn-block" style={{fontSize:17,padding:"16px 20px"}} onClick={join} disabled={loading}>
        {loading?"Bezig…":"⚽ Meedoen →"}
      </button>
    </div>
  </div>;
}

// ── QuestionInput — defined outside PredictionsScreen to prevent focus loss ────
function QuestionInput({q,val,onChange,teamA,teamB}){
  if(q.type==="team"){
    const opts=[teamA,teamB,"Gelijkspel"];
    return <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {opts.map(o=><button key={o}
        style={{flex:1,minWidth:80,padding:"10px 8px",borderRadius:10,border:`2px solid ${val===o?"var(--g)":"#2a2a2a"}`,
          background:val===o?"#0e1a0e":"#131313",color:val===o?"var(--g)":"#888",
          fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s"}}
        onClick={()=>onChange(o)}>{o}</button>)}
    </div>;
  }
  if(q.type==="yesno"){
    return <div style={{display:"flex",gap:10}}>
      {["Ja","Nee"].map(o=><button key={o}
        style={{flex:1,padding:"12px",borderRadius:10,border:`2px solid ${val===o?(o==="Ja"?"var(--g)":"var(--r)"):"#2a2a2a"}`,
          background:val===o?(o==="Ja"?"#0e1a0e":"#1a0200"):"#131313",
          color:val===o?(o==="Ja"?"var(--g)":"var(--r)"):"#888",
          fontWeight:800,fontSize:16,cursor:"pointer",transition:"all .15s"}}
        onClick={()=>onChange(o)}>{o==="Ja"?"✅ Ja":"❌ Nee"}</button>)}
    </div>;
  }
  if(q.type==="choice"){
    return <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {(q.choices||[]).map(o=><button key={o}
        style={{padding:"8px 14px",borderRadius:8,border:`2px solid ${val===o?"var(--y)":"#2a2a2a"}`,
          background:val===o?"#1a1400":"#131313",color:val===o?"var(--y)":"#888",
          fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s"}}
        onClick={()=>onChange(o)}>{o}</button>)}
    </div>;
  }
  if(q.type==="score"){
    return <div style={{display:"flex",alignItems:"center",gap:8}}>
      <input type="number" min={0} max={20} value={val.split("-")[0]||""}
        onChange={e=>onChange(e.target.value+"-"+(val.split("-")[1]||"0"))}
        style={{width:56,background:"#131313",border:"1px solid #2a2a2a",borderRadius:8,padding:"10px",
          fontSize:22,fontWeight:800,textAlign:"center",color:"white"}}/>
      <span style={{fontSize:22,color:"#555",fontWeight:800}}>–</span>
      <input type="number" min={0} max={20} value={val.split("-")[1]||""}
        onChange={e=>onChange((val.split("-")[0]||"0")+"-"+e.target.value)}
        style={{width:56,background:"#131313",border:"1px solid #2a2a2a",borderRadius:8,padding:"10px",
          fontSize:22,fontWeight:800,textAlign:"center",color:"white"}}/>
      <div style={{fontSize:12,color:"#555",lineHeight:1.3}}>{teamA}<br/>{teamB}</div>
    </div>;
  }
  return <input className="inp inp-sm" value={val} placeholder={q.hint||"Jouw antwoord"}
    onChange={e=>onChange(e.target.value)}/>;
}

// ── PredictionsScreen ─────────────────────────────────────────────────────────
function PredictionsScreen({sess,player,onDone}){
  const questions=(sess.predictions_config||[]).map(id=>PREDICTION_QUESTIONS.find(q=>q.id===id)).filter(Boolean);
  const [answers,setAnswers]=useState({});
  const [loading,setLoading]=useState(false);
  const teamA=sess.team_a||"Team A";
  const teamB=sess.team_b||"Team B";

  if(!questions.length){onDone();return null;}

  async function submit(){
    setLoading(true);
    await sb.from("wk_players").update({predictions:answers}).eq("id",player.id);
    onDone();
  }

  function setAns(id,val){setAnswers(a=>({...a,[id]:val}));}
  const allAnswered=questions.every(q=>(answers[q.id]||"").trim());

  return <div className="screen" style={{background:"#0a0a0a",padding:"0 0 env(safe-area-inset-bottom,16px)"}}>
    <div style={{padding:"16px 16px 12px",borderBottom:"1px solid #1e1e1e"}}>
      <div className="anto" style={{fontSize:22,color:"var(--y)"}}>🔮 Voorspellingen</div>
      <div style={{fontSize:13,color:"#555",marginTop:2}}>{teamA} vs {teamB} · {questions.length} vragen</div>
    </div>
    <div style={{flex:1,overflow:"auto",padding:"16px 16px 24px"}}>
      {questions.map((q,i)=>{
        const answered=(answers[q.id]||"").trim();
        return <div key={q.id} className={`pred-q${answered?" answered":""}`}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{fontSize:22}}>{q.emoji}</div>
            <div>
              <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1}}>VRAAG {i+1}</div>
              <div style={{fontWeight:700,fontSize:14,color:answered?"#fff":"#ccc"}}>{q.q}</div>
            </div>
            {answered&&<div style={{marginLeft:"auto",color:"var(--g)",fontSize:18}}>✓</div>}
          </div>
          <QuestionInput q={q} val={answers[q.id]||""} onChange={v=>setAns(q.id,v)} teamA={teamA} teamB={teamB}/>
        </div>;
      })}
      <div style={{color:"#555",fontSize:12,textAlign:"center",margin:"12px 0"}}>
        {allAnswered?"✅ Alle vragen ingevuld!":
         `${questions.filter(q=>(answers[q.id]||"").trim()).length}/${questions.length} ingevuld`}
      </div>
      <button className="btn btn-gold btn-block" onClick={submit} disabled={loading}>
        {loading?"Bezig…":"Voorspellingen Opslaan →"}
      </button>
      <button className="btn btn-ghost btn-block btn-sm" style={{marginTop:8}} onClick={onDone}>
        Overslaan (later invullen)
      </button>
    </div>
  </div>;
}

// ── WaitScreen ────────────────────────────────────────────────────────────────
function WaitScreen({sess,players,me}){
  return <div className="screen center" style={{background:"#0a0a0a",padding:24,flexDirection:"column",gap:16}}>
    <div className="spin" style={{width:48,height:48,borderTopColor:"var(--g)"}}/>
    <div className="anto" style={{fontSize:24,color:"var(--g)"}}>Wachten op de host…</div>
    {sess.match_name&&<div style={{textAlign:"center"}}>
      <div style={{color:"#555",fontSize:13}}>{sess.match_name}</div>
      {sess.match_score&&<div className="match-score" style={{marginTop:4}}>{sess.match_score}</div>}
    </div>}
    <div style={{width:"100%",maxWidth:320}}>
      <div className="neon-lbl mb8">SPELERS ({players.length})</div>
      {players.map(p=>(
        <div key={p.id} className="p-row">
          <PlayerAvatar p={p}/>
          <div style={{flex:1,fontWeight:700}}>{p.name}</div>
          {p.is_host&&<span className="pill pill-gold">HOST</span>}
        </div>
      ))}
    </div>
  </div>;
}

// ── PlayScreen ────────────────────────────────────────────────────────────────
function PlayScreen({sess:initSess,players:initPlayers,me:initMe,onEnd,addToast}){
  const [sess,setSess]=useState(initSess);
  const [players,setPlayers]=useState(initPlayers);
  const [me,setMe]=useState(initMe);
  const [tab,setTab]=useState("kaart"); // kaart | scores | predictions | host
  const [hostSheet,setHostSheet]=useState(false);
  const [uitdelenSheet,setUitdelenSheet]=useState(null);
  const [extraSheet,setExtraSheet]=useState(false);
  const [matchSheet,setMatchSheet]=useState(false);
  const [matchName,setMatchName]=useState(initSess.match_name||"");
  const [matchScore,setMatchScore]=useState(initSess.match_score||"");
  const [drinkAlert,setDrinkAlert]=useState(null); // {label, playerName, playerColor, bg}
  const [drinkOut,setDrinkOut]=useState(false);
  const [goalBanner,setGoalBanner]=useState(false);
  const [hostAlert,setHostAlert]=useState(null);
  const [flashCells,setFlashCells]=useState(new Set());
  const [waterShown,setWaterShown]=useState(false);
  const [extraTarget,setExtraTarget]=useState("");
  const [extraEventId,setExtraEventId]=useState("");
  const [allEvents,setAllEvents]=useState([]);
  const [liveCards,setLiveCards]=useState({});
  const [confirmEndOpen,setConfirmEndOpen]=useState(false);
  const chRef=useRef(null);

  const gs=sess.grid_size||4;
  const lines=gs===4?LINES4:LINES3;
  const isHost=me.is_host;
  const C=COLORS[me.color]||COLORS.groen;

  // load all events for host to pick from
  useEffect(()=>{
    if(isHost){
      sb.from("wk_events").select("*").eq("active",true)
        .then(({data})=>setAllEvents(data||[]));
    }
  },[isHost]);

  // Wake lock
  useEffect(()=>{reqWL();return()=>relWL();},[]);

  // Realtime
  useEffect(()=>{
    const ch=sb.channel("wk-"+sess.id)
      .on("postgres_changes",{event:"*",schema:"public",table:"wk_players",filter:`session_id=eq.${sess.id}`},({new:nr,old:or,eventType})=>{
        if(eventType==="DELETE"){setPlayers(p=>p.filter(x=>x.id!==or?.id));return;}
        if(nr.id===me.id){
          if(nr.is_kicked){alert("Je bent verwijderd door de host.");onEnd();return;}
          // Update own player — keep local version if it's newer (optimistic updates), but always sync host-set fields.
          // Always preserve prev.card: card never changes during play and nr.card can be null if the DB row was patched without card.
          setMe(prev=>(nr.version||0)>=(prev.version||0)?{...nr,card:prev.card||nr.card}:{...prev,extra_vakjes:nr.extra_vakjes,predictions:nr.predictions});
          setPlayers(prev=>prev.map(p=>p.id===nr.id?nr:p));
          return;
        }
        setPlayers(prev=>{
          const i=prev.findIndex(p=>p.id===nr.id);
          return i===-1?[...prev,nr]:prev.map((p,ii)=>ii===i?nr:p);
        });
      })
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"wk_sessions",filter:`id=eq.${sess.id}`},({new:ns})=>{
        setSess(ns);
        setMatchName(ns.match_name||"");
        setMatchScore(ns.match_score||"");
        if(ns.status==="finished"){onEnd();}
        if(ns.host_alert){
          const prev=sess.host_alert;
          if(!prev||ns.host_alert.ts>prev.ts){
            const ha=ns.host_alert;
            // Full-screen drink alert for adje/iedereen/bingo events
            if(ha.type==="bingo"){
              showDrinkAlert(ha.label,ha.playerName,ha.playerColor,"#0a1f00",4000);
            } else if(ha.type&&ha.playerName!==me?.name){
              showDrinkAlert(ha.label,ha.playerName,ha.playerColor,ha.bg||"#2a0000",3500);
              if(ha.type==="iedereen_adje"){
                setMe(prev=>{
                  if(!prev)return prev;
                  const newSlok=(prev.total_slok||0)+ADJE_VAL;
                  sb.from("wk_players").update({total_slok:newSlok}).eq("id",prev.id);
                  return {...prev,total_slok:newSlok};
                });
              }
            } else if(!ha.type){
              setHostAlert(ha);
              setTimeout(()=>setHostAlert(null),6000);
            }
          }
        }
      })
      .subscribe();
    chRef.current=ch;
    return()=>{sb.removeChannel(ch);};
  },[sess.id]);

  // Water alarm
  useEffect(()=>{
    if(!waterShown&&me.total_slok>=(sess.water_alarm||15)){
      setWaterShown(true);
      addToast(`💧 ${me.total_slok} slokken op! Drink even een glas water 💧`,{dur:8000,color:"#06b6d4"});
    }
  },[me.total_slok,waterShown,sess.water_alarm]);

  function showDrinkAlert(label,playerName,playerColor,bg,dur=3200){
    buzz([100,50,200,50,300]);
    setDrinkOut(false);
    setDrinkAlert({label,playerName,playerColor,bg});
    setTimeout(()=>{setDrinkOut(true);setTimeout(()=>setDrinkAlert(null),280);},dur);
  }

  async function tapCell(idx){
    const ev=me.card[idx];
    if(!ev)return;
    await hitCell(idx,ev);
  }

  async function hitCell(idx,ev){
    sClick();
    if(ev.vibrate)buzz([150,50,150]);

    const newCounts=[...(me.counts||[])];
    newCounts[idx]=(newCounts[idx]||0)+1;
    const addSlok=slokValue(ev);
    const newTotal=(me.total_slok||0)+addSlok;
    const newBL=checkBingo(newCounts,gs);
    const prevBL=me.bingo_lines||[];
    const newLines=newBL.filter(l=>!prevBL.some(pl=>pl.join()===l.join()));

    // Drink alerts — broadcast to all via host_alert
    if(ev.slok_type==="adje_iedereen"){
      sAdje();
      showDrinkAlert(`IEDEREEN EEN ADJE! 🍺\n${ADJE_VAL} slokken`,me.name,C.a,"#2a0000",3500);
      await sb.from("wk_sessions").update({host_alert:{type:"iedereen_adje",label:`IEDEREEN EEN ADJE! 🍺\n${ADJE_VAL} slokken`,playerName:me.name,playerColor:C.a,bg:"#2a0000",ts:Date.now()}}).eq("id",sess.id);
    } else if(ev.slok_type==="dubbel_adje"){
      sAdje();
      showDrinkAlert(`💀 ${me.name} DUBBEL ADJE!\n${ADJE_VAL*2} slokken`,me.name,C.a,"#1a0030",4000);
      await sb.from("wk_sessions").update({host_alert:{type:"dubbel_adje",label:`💀 ${me.name} — DUBBEL ADJE!\n${ADJE_VAL*2} slokken`,playerName:me.name,playerColor:C.a,bg:"#1a0030",ts:Date.now()}}).eq("id",sess.id);
    } else if(ev.slok_type==="adje"){
      sAdje();
      showDrinkAlert(`🍺 ${me.name} — ADJE!\n${ADJE_VAL} slokken`,me.name,C.a,"#2a0800",3200);
      await sb.from("wk_sessions").update({host_alert:{type:"adje",label:`🍺 ${me.name} — ADJE!\n${ADJE_VAL} slokken`,playerName:me.name,playerColor:C.a,bg:"#2a0800",ts:Date.now()}}).eq("id",sess.id);
    }
    if(ev.label.toLowerCase().includes("doelpunt")||ev.label.toLowerCase().includes("goal")){
      setGoalBanner(true);sGoal();confetti(70,C.a);
      setTimeout(()=>setGoalBanner(false),2500);
    }
    if(newLines.length>0){
      sBingo();confetti(50);
      newLines.forEach(line=>line.forEach(i=>{
        setFlashCells(fc=>{const s=new Set(fc);s.add(i);return s;});
        setTimeout(()=>setFlashCells(fc=>{const s=new Set(fc);s.delete(i);return s;}),700);
      }));
      const bingoLabel=`🏆 ${me.name} heeft BINGO!\nIedereen 2 slokken!`;
      showDrinkAlert(bingoLabel,me.name,C.a,"#0a1f00",4000);
      await sb.from("wk_sessions").update({host_alert:{type:"bingo",label:bingoLabel,playerName:me.name,playerColor:C.a,ts:Date.now()}}).eq("id",sess.id);
    }
    if(ev.slok_type==="uitdelen") setUitdelenSheet({idx,ev,slok:ev.slok||2});

    const slokMsg=ev.slok_type==="adje"?"🍺 ADJE!":ev.slok_type==="adje_iedereen"?"🍺 IEDEREEN ADJE!":
      ev.slok_type==="dubbel_adje"?"💀 DUBBEL ADJE!":ev.slok_type==="uitdelen"?"👉 Deel uit!":
      `🍺 +${addSlok} slok${addSlok!==1?"ken":""}`;
    addToast(slokMsg,{dur:2500,color:slokColor(ev)});

    const updated={...me,counts:newCounts,total_slok:newTotal,bingo_lines:newBL,version:(me.version||0)+1};
    setMe(updated);setPlayers(ps=>ps.map(p=>p.id===me.id?updated:p));
    await sb.from("wk_players").update({counts:newCounts,total_slok:newTotal,bingo_lines:newBL,version:updated.version}).eq("id",me.id);
  }

  async function giveSlok(targetId,amount){
    const t=players.find(p=>p.id===targetId);
    if(!t)return;
    const newSlok=(t.total_slok||0)+amount;
    await sb.from("wk_players").update({total_slok:newSlok}).eq("id",targetId);
    setPlayers(ps=>ps.map(p=>p.id===targetId?{...p,total_slok:newSlok}:p));
    addToast(`👉 ${amount} slokken gegeven aan ${t.name}!`,{dur:3000,color:"var(--g)"});
    setUitdelenSheet(null);
  }

  async function saveMatch(){
    await sb.from("wk_sessions").update({match_name:matchName,match_score:matchScore}).eq("id",sess.id);
    setMatchSheet(false);
  }
  async function triggerAlert(label,emoji){
    await sb.from("wk_sessions").update({host_alert:{label,emoji,ts:Date.now()}}).eq("id",sess.id);
  }
  async function triggerGoal(){
    const newCount=(sess.goal_count||0)+1;
    await sb.from("wk_sessions").update({goal_count:newCount}).eq("id",sess.id);
    const isMooiste=newCount===sess.mooiste_goal_nr;
    if(isMooiste){
      await triggerAlert("MOOISTE GOAL! 🌟","🌟");
    } else {
      await triggerAlert(`Goal #${newCount}! ⚽`,"⚽");
    }
  }
  async function endSession(){
    setConfirmEndOpen(true);
  }
  async function doEndSession(){
    setConfirmEndOpen(false);
    await sb.from("wk_sessions").update({status:"finished"}).eq("id",sess.id);
  }
  async function addExtraVakje(){
    if(!extraTarget||!extraEventId)return;
    const ev=allEvents.find(e=>e.id===extraEventId);
    const target=players.find(p=>p.id===extraTarget);
    if(!ev||!target)return;
    const extra=[...(target.extra_vakjes||[]),ev];
    await sb.from("wk_players").update({extra_vakjes:extra}).eq("id",extraTarget);
    setExtraSheet(false);
    addToast(`Extra vakje toegevoegd aan ${target.name}!`,{dur:3000,color:"var(--y)"});
  }

  async function reloadCard(){
    const{data}=await sb.from("wk_players").select("*").eq("id",me.id).single();
    if(data?.card?.length){
      setMe(prev=>({...prev,card:data.card,counts:data.counts||prev.counts}));
      addToast("✅ Kaart geladen!",{dur:2000,color:"var(--g)"});
    } else {
      addToast("Geen kaart gevonden in database",{dur:2500,color:"var(--r)"});
    }
  }

  async function addExtraVakjeAllen(){
    if(!allEvents.length)return;
    const ev=allEvents[Math.floor(Math.random()*allEvents.length)];
    const nonHosts=players.filter(p=>!p.is_host);
    await Promise.all(nonHosts.map(p=>{
      const extra=[...(p.extra_vakjes||[]),ev];
      return sb.from("wk_players").update({extra_vakjes:extra}).eq("id",p.id);
    }));
    addToast(`⭐ "${ev.label}" als extra vakje aan iedereen!`,{dur:3500,color:"var(--y)"});
  }

  async function tapExtra(ev,idx){
    sClick();
    if(ev.vibrate)buzz([150,50,150]);
    const addSlok=slokValue(ev);
    const newTotal=(me.total_slok||0)+addSlok;
    const newExtra=(me.extra_vakjes||[]).filter((_,i)=>i!==idx);
    const updated={...me,total_slok:newTotal,extra_vakjes:newExtra};
    setMe(updated);
    await sb.from("wk_players").update({total_slok:newTotal,extra_vakjes:newExtra}).eq("id",me.id);
    addToast(`🍺 +${addSlok} (extra vakje)`,{dur:2000,color:"var(--y)"});
  }

  const sorted=[...players].sort((a,b)=>(b.total_slok||0)-(a.total_slok||0));

  const sortedPlayers=[...players].sort((a,b)=>(b.total_slok||0)-(a.total_slok||0));
  const maxSlok=Math.max(1,...players.map(p=>p.total_slok||0));
  const code=sess.id.toUpperCase().slice(0,6);

  return <div style={{display:"flex",flexDirection:"column",height:"100vh",background:C.bg,maxWidth:480,margin:"0 auto",position:"relative"}}>
    {/* Match + player header */}
    <div className="match-bar" style={{cursor:isHost?"pointer":"default"}} onClick={()=>isHost&&setMatchSheet(true)}>
      <div style={{flex:1,minWidth:0}}>
        <div className="match-name">{sess.match_name||"⚽ WK Bingo 2026"}</div>
      </div>
      {sess.match_score&&<div className="match-score">{sess.match_score}</div>}
      <button onClick={e=>{e.stopPropagation();reloadCard();}}
        style={{background:"#1a1a00",border:"1px solid var(--y)",borderRadius:8,padding:"4px 8px",
          color:"var(--y)",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
        ↺ Kaart laden
      </button>
      <div className="sess-code"><span className="sess-code-lbl">CODE</span><span className="sess-code-val">{code}</span></div>
    </div>
    <div className="player-bar">
      <PlayerAvatar p={me} size={32}/>
      <div style={{flex:1}}>
        <div style={{fontWeight:800,fontSize:13}}>{me.name}</div>
        <div style={{fontSize:10,color:C.a,fontWeight:700}}>{COLORS[me.color]?.lbl}</div>
      </div>
      <div style={{fontFamily:"Anton,Impact,sans-serif",fontSize:20,color:"var(--y)"}}>🍺 {me.total_slok||0}</div>
    </div>

    {/* ── KAART TAB ── */}
    {tab==="kaart"&&<div style={{flex:1,overflow:"auto",padding:"10px 12px 8px"}}>
      <div className={`bingo-grid-${gs}`}>
        {(me.card||[]).map((ev,i)=>{
          const hit=(me.counts||[])[i]>0;
          const hitCount=(me.counts||[])[i]||0;
          return <div key={ev.id+i}
            className={`cell${hit?" hit":""}${ev.is_rare&&!hit?" rare":""}${flashCells.has(i)?" bingo-ln":""}`}
            style={{background:hit?C.a+"55":C.cell,borderColor:ev.is_rare&&!hit?"var(--y)":hit?C.a:C.bd,color:C.tx}}
            onClick={()=>tapCell(i)}>
            <div className="cell-emoji">{ev.emoji||"⚽"}</div>
            <div className="cell-label" style={{color:hit?"#fff":C.tx,opacity:hit?.8:1}}>{ev.label}</div>
            <div className="cell-slok" style={{color:slokColor(ev)}}>{slokLabel(ev)}</div>
            {hit&&hitCount>1&&<div style={{position:"absolute",bottom:3,left:5,fontSize:9,fontWeight:900,opacity:.7}}>×{hitCount}</div>}
          </div>;
        })}
      </div>
      {(me.extra_vakjes||[]).length>0&&<div style={{marginTop:12}}>
        <div className="neon-lbl mb8" style={{color:"var(--y)"}}>⭐ EXTRA VAKJES</div>
        <div className="row gap8" style={{flexWrap:"wrap"}}>
          {(me.extra_vakjes||[]).map((ev,i)=>(
            <div key={ev.id+i} style={{background:C.cell,border:"2px solid var(--y)",borderRadius:12,padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}
              onClick={()=>tapExtra(ev,i)}>
              <span style={{fontSize:20}}>{ev.emoji}</span>
              <div><div style={{fontSize:12,fontWeight:700}}>{ev.label}</div><div style={{fontSize:10,color:"var(--y)"}}>{slokLabel(ev)}</div></div>
            </div>
          ))}
        </div>
      </div>}
    </div>}

    {/* ── SCORES TAB ── */}
    {tab==="scores"&&<div style={{flex:1,overflow:"auto",padding:"12px 16px"}}>
      <div className="anto" style={{fontSize:18,color:"var(--y)",marginBottom:12}}>🏆 Ranglijst</div>
      {sortedPlayers.map((p,i)=>{
        const C2=COLORS[p.color]||COLORS.groen;
        const pct=Math.round(((p.total_slok||0)/maxSlok)*100);
        return <div key={p.id} className={`lb-row${p.id===me.id?" me":""}`} style={{marginBottom:8,borderColor:p.id===me.id?C.a:"#1e1e1e"}}>
          <div className="lb-rank">{["🥇","🥈","🥉"][i]||i+1}</div>
          <div style={{fontSize:26}}>{p.avatar||"⚽"}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:13,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",color:C2.a}}>{p.name}</div>
            <div className="beer-track" style={{marginTop:4}}><div className="beer-fill" style={{width:pct+"%",background:C2.a}}/></div>
          </div>
          <div style={{fontFamily:"Anton,Impact,sans-serif",fontSize:18,color:"var(--y)",minWidth:44,textAlign:"right"}}>🍺{p.total_slok||0}</div>
        </div>;
      })}
    </div>}

    {/* ── VOORSPELLINGEN TAB ── */}
    {tab==="predictions"&&<div style={{flex:1,overflow:"auto",padding:"12px 16px"}}>
      {(sess.predictions_config||[]).length===0
        ? <div style={{display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8,padding:32,height:"100%"}}>
            <div style={{fontSize:40}}>🔮</div>
            <div style={{color:"#555",fontSize:14}}>Geen voorspellingen voor deze sessie</div>
          </div>
        : <>
          <div className="anto" style={{fontSize:18,color:"var(--y)",marginBottom:4}}>🔮 Jouw Voorspellingen</div>
          <div style={{fontSize:12,color:"#555",marginBottom:12}}>Alleen jij ziet jouw antwoorden</div>
          {(sess.predictions_config||[]).map((id,i)=>{
            const q=PREDICTION_QUESTIONS.find(x=>x.id===id);
            if(!q)return null;
            const ans=(me.predictions||{})[q.id]||"";
            const isCorrect=(sess.predictions_correct||{})[q.id]===true;
            const isWrong=(sess.predictions_correct||{})[q.id]===false;
            return <div key={q.id} className={`pred-q${ans?" answered":""}${isCorrect?" correct":""}${isWrong?" wrong":""}`}>
              <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                <div style={{fontSize:20}}>{q.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#555",marginBottom:2}}>Vraag {i+1}</div>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>{q.q}</div>
                  <div style={{background:"#1c1c1c",borderRadius:8,padding:"8px 12px",fontSize:13,color:ans?"#fff":"#555"}}>{ans||"— niet ingevuld —"}</div>
                  {isCorrect&&<div style={{color:"var(--g)",fontSize:12,marginTop:4,fontWeight:700}}>✅ Correct! Je mag uitdelen</div>}
                  {isWrong&&<div style={{color:"#555",fontSize:12,marginTop:4}}>❌ Niet goed</div>}
                </div>
              </div>
            </div>;
          })}
        </>}
    </div>}

    {/* ── HOST TAB ── */}
    {tab==="host"&&isHost&&<div style={{flex:1,overflow:"auto",padding:"12px 16px"}}>
      <div className="anto" style={{fontSize:18,color:"var(--g)",marginBottom:12}}>⚙️ Host Paneel</div>
      <div className="section">
        <div className="neon-lbl mb8">WEDSTRIJD & STAND</div>
        <button className="btn btn-ghost btn-block btn-sm mb8" onClick={()=>setMatchSheet(true)}>✏️ Wedstrijd/Stand Aanpassen</button>
        {sess.match_name&&<div style={{fontSize:13,color:"#555"}}>{sess.match_name}{sess.match_score&&` — ${sess.match_score}`}</div>}
      </div>
      <div className="section">
        <div className="neon-lbl mb8">DOELPUNTEN</div>
        <button className="btn btn-gold btn-block btn-sm mb4" onClick={()=>{triggerGoal();addToast("Goal!",{color:"var(--y)"});}}>
          ⚽ Goal registreren (#{(sess.goal_count||0)+1})
        </button>
        <div style={{fontSize:11,color:"#555"}}>Mooiste goal = #{sess.mooiste_goal_nr||3} · Nu: {sess.goal_count||0}</div>
      </div>
      <div className="section">
        <div className="neon-lbl mb8">MELDINGEN STUREN</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {[{l:"🟥 Rode kaart!",e:"🟥"},{l:"🟨 Gele kaart!",e:"🟨"},{l:"📺 VAR-check",e:"📺"},{l:"🎯 Vrije trap!",e:"🎯"},{l:"🍺 Iedereen drinkt!",e:"🍺"}].map(({l,e})=>(
            <button key={l} className="btn btn-ghost btn-sm" style={{fontSize:12}} onClick={()=>triggerAlert(l,e)}>{l}</button>
          ))}
        </div>
      </div>
      <div className="section">
        <div className="neon-lbl mb8">EXTRA VAKJE</div>
        <button className="btn btn-ghost btn-block btn-sm" onClick={()=>setExtraSheet(true)}>⭐ Extra Vakje aan Speler</button>
        <button className="btn btn-ghost btn-block btn-sm" style={{marginTop:6,borderColor:"var(--y)33",color:"var(--y)"}} onClick={addExtraVakjeAllen}>⭐ Random Extra Vakje aan Iedereen</button>
      </div>
      <div className="section">
        <div className="neon-lbl mb8">LIVE KAARTEN SPELERS</div>
        {players.filter(p=>!p.is_host).map(p=>{
          const C2=COLORS[p.color]||COLORS.groen;
          const hits=(p.counts||[]).filter(c=>c>0).length;
          return <div key={p.id} style={{background:"#131313",border:"1px solid #1e1e1e",borderRadius:10,padding:10,marginBottom:8}}>
            <div className="row gap8 mb6">
              <PlayerAvatar p={p} size={28}/>
              <span style={{fontWeight:700,flex:1,fontSize:13}}>{p.name}</span>
              <span style={{fontSize:11,color:"var(--y)"}}>{hits} hits · 🍺{p.total_slok||0}</span>
            </div>
            <div className="mini-grid">
              {(p.card||[]).map((ev,i)=>(
                <div key={i} className="mini-cell"
                  style={{background:(p.counts||[])[i]>0?C2.a+"66":C2.cell,color:C2.tx,borderColor:(p.counts||[])[i]>0?C2.a:C2.bd}}>
                  <span style={{fontSize:11}}>{ev.emoji}</span>
                </div>
              ))}
            </div>
          </div>;
        })}
      </div>
      {(sess.predictions_config||[]).length>0&&<div className="section">
        <div className="neon-lbl mb8">VOORSPELLINGEN OVERZICHT</div>
        {(sess.predictions_config||[]).map(id=>{
          const q=PREDICTION_QUESTIONS.find(x=>x.id===id);
          if(!q)return null;
          return <div key={id} style={{background:"#131313",border:"1px solid #1e1e1e",borderRadius:10,padding:10,marginBottom:8}}>
            <div style={{fontWeight:700,fontSize:12,marginBottom:6}}>{q.emoji} {q.q}</div>
            {players.filter(p=>!p.is_host).map(p=>(
              <div key={p.id} className="row gap6" style={{marginBottom:4}}>
                <span style={{fontSize:12}}>{p.avatar}</span>
                <span style={{fontSize:11,color:COLORS[p.color]?.a,flex:1}}>{p.name}</span>
                <span style={{fontSize:11,color:"#fff"}}>{(p.predictions||{})[id]||<span style={{color:"#555"}}>—</span>}</span>
                <button style={{background:"none",border:"1px solid var(--g)",borderRadius:6,padding:"2px 6px",fontSize:10,color:"var(--g)",cursor:"pointer"}}
                  onClick={async()=>{const nc={...(sess.predictions_correct||{}),[id]:true};await sb.from("wk_sessions").update({predictions_correct:nc}).eq("id",sess.id);setSess(s=>({...s,predictions_correct:nc}));}}>✓</button>
              </div>
            ))}
          </div>;
        })}
      </div>}
      <hr className="divider"/>
      <button className="btn btn-block btn-sm" style={{background:"var(--r)22",border:"1px solid var(--r)55",color:"var(--r)",padding:"12px"}} onClick={endSession}>🏁 Sessie Beëindigen</button>
    </div>}

    {/* End session confirm dialog */}
    <ConfirmDialog
      open={confirmEndOpen}
      title="Sessie beëindigen?"
      body={`Alle spelers worden naar het eindscherm gestuurd. Dit kan niet ongedaan worden gemaakt.`}
      confirmLabel="🏁 Ja, beëindigen"
      danger={true}
      onConfirm={doEndSession}
      onCancel={()=>setConfirmEndOpen(false)}/>

    {/* Bottom navigation */}
    <div className="bottom-nav">
      <button className={`nav-btn${tab==="kaart"?" active":""}`} onClick={()=>setTab("kaart")}>
        <div className="nav-btn-icon">⚽</div><div className="nav-btn-lbl">Kaart</div>
      </button>
      <button className={`nav-btn${tab==="scores"?" active":""}`} onClick={()=>setTab("scores")}>
        <div className="nav-btn-icon">🏆</div><div className="nav-btn-lbl">Scores</div>
      </button>
      <button className={`nav-btn${tab==="predictions"?" active":""}`} onClick={()=>setTab("predictions")}>
        <div className="nav-btn-icon">🔮</div><div className="nav-btn-lbl">Voorspel</div>
      </button>
      {isHost&&<button className={`nav-btn${tab==="host"?" active":""}`} onClick={()=>setTab("host")}>
        <div className="nav-btn-icon">⚙️</div><div className="nav-btn-lbl">Host</div>
      </button>}
    </div>

    {/* Full-screen drink alert */}
    {drinkAlert&&<div className={`drink-alert${drinkOut?" drink-alert-out":""}`} style={{background:drinkAlert.bg||"#2a0000"}}
      onClick={()=>{setDrinkOut(true);setTimeout(()=>setDrinkAlert(null),280);}}>
      <div style={{fontSize:80}}>🍺</div>
      <div style={{fontFamily:"Anton,Impact,sans-serif",fontSize:32,color:drinkAlert.playerColor||"#fff",textAlign:"center",lineHeight:1.1,whiteSpace:"pre-line"}}>
        {drinkAlert.label}
      </div>
      <div style={{fontSize:14,color:"#ffffff88",marginTop:8}}>Tik om te sluiten</div>
    </div>}

    {/* GOAL banner */}
    {goalBanner&&<div style={{position:"fixed",top:"30%",left:"50%",transform:"translateX(-50%)",zIndex:1500,animation:"goalBoom .4s ease-out",fontFamily:"Anton,Impact,sans-serif",fontSize:48,color:"var(--y)",textShadow:"0 0 30px var(--y)",pointerEvents:"none",whiteSpace:"nowrap"}}>
      ⚽ DOELPUNT!
    </div>}

    {/* Host info alert (non-drink) */}
    {hostAlert&&<div className="host-alert">
      <div style={{fontSize:32,marginBottom:4}}>{hostAlert.emoji||"📢"}</div>
      <div style={{fontFamily:"Anton,Impact,sans-serif",fontSize:17,color:"var(--y)"}}>{hostAlert.label}</div>
      <div style={{fontSize:11,color:"#555",marginTop:4}}>Check je kaart!</div>
    </div>}

    {/* Uitdelen sheet */}
    <Sheet open={!!uitdelenSheet} onClose={()=>setUitdelenSheet(null)}>
      <div className="anto" style={{fontSize:20,marginBottom:4,color:"var(--g)"}}>{uitdelenSheet?.ev?.emoji} Uitdelen</div>
      <div style={{color:"#555",fontSize:13,marginBottom:16}}>Kies wie er {uitdelenSheet?.ev?.slok||2} slokken moet drinken</div>
      {players.filter(p=>p.id!==me.id).map(p=>(
        <div key={p.id} className="p-row" style={{cursor:"pointer"}} onClick={()=>giveSlok(p.id,uitdelenSheet?.ev?.slok||2)}>
          <PlayerAvatar p={p}/><div style={{flex:1,fontWeight:700}}>{p.name}</div>
          <span style={{color:"var(--y)",fontFamily:"Anton,Impact,sans-serif"}}>🍺 {p.total_slok||0}</span>
        </div>
      ))}
      {players.length<=1&&<div style={{color:"#555",textAlign:"center",padding:16}}>Geen andere spelers</div>}
    </Sheet>

    {/* Match edit sheet */}
    <Sheet open={matchSheet} onClose={()=>setMatchSheet(false)}>
      <div className="anto" style={{fontSize:20,marginBottom:16,color:"var(--g)"}}>📍 Wedstrijd</div>
      <div className="neon-lbl mb8">WEDSTRIJD</div>
      <input className="inp" value={matchName} onChange={e=>setMatchName(e.target.value)} placeholder="🇳🇱 Nederland vs 🇧🇷 Brazilië" style={{marginBottom:12}}/>
      <div className="neon-lbl mb8">STAND</div>
      <input className="inp" value={matchScore} onChange={e=>setMatchScore(e.target.value)} placeholder="0 - 0" style={{marginBottom:20}}/>
      <button className="btn btn-green btn-block" onClick={saveMatch}>Opslaan</button>
    </Sheet>

    {/* Extra vakje sheet */}
    <Sheet open={extraSheet} onClose={()=>setExtraSheet(false)}>
      <div className="anto" style={{fontSize:20,marginBottom:16,color:"var(--y)"}}>⭐ Extra Vakje</div>
      <div className="neon-lbl mb8">SPELER</div>
      <select className="inp inp-sm" style={{marginBottom:12}} value={extraTarget} onChange={e=>setExtraTarget(e.target.value)}>
        <option value="">— Kies speler —</option>
        {players.filter(p=>p.id!==me.id).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
      </select>
      <div className="neon-lbl mb8">VAKJE</div>
      <select className="inp inp-sm" style={{marginBottom:20}} value={extraEventId} onChange={e=>setExtraEventId(e.target.value)}>
        <option value="">— Kies vakje —</option>
        {allEvents.map(e=><option key={e.id} value={e.id}>{e.emoji} {e.label} ({slokLabel(e)})</option>)}
      </select>
      <button className="btn btn-gold btn-block" onClick={addExtraVakje} disabled={!extraTarget||!extraEventId}>⭐ Toevoegen</button>
    </Sheet>
  </div>;
}

// ── WinnerScreen ──────────────────────────────────────────────────────────────
function WinnerScreen({sess,players,me,onHome,onRematch}){
  const sorted=[...players].sort((a,b)=>(b.total_slok||0)-(a.total_slok||0));
  const top=sorted.slice(0,3);
  const C=COLORS[me.color]||COLORS.groen;

  useEffect(()=>{sFanfare();confetti(100,C.a);},[]);

  return <div className="screen" style={{background:"#0a0a0a",padding:"24px 20px 40px",overflowY:"auto"}}>
    <div style={{textAlign:"center",marginBottom:24}}>
      <div style={{fontSize:64}}>🏆</div>
      <div className="anto" style={{fontSize:32,color:"var(--y)"}}>EINDSTAND</div>
      {sess.match_name&&<div style={{color:"#555",fontSize:14,marginTop:4}}>{sess.match_name}</div>}
    </div>

    <div className="podium-wrap" style={{marginBottom:24}}>
      {[1,0,2].map((pos,colIdx)=>{
        const p=top[pos];
        if(!p)return <div key={pos} style={{flex:1}}/>;
        const colHeights=[90,120,70]; // links=90, midden=120(hoogst), rechts=70
        const rankMedals=["🥇","🥈","🥉"]; // rang 0=goud, 1=zilver, 2=brons
        const C2=COLORS[p.color]||COLORS.groen;
        return <div key={p.id} className="podium-col">
          <div style={{fontSize:28}}>{p.avatar||"⚽"}</div>
          <div style={{fontSize:12,fontWeight:800,color:C2.a,textAlign:"center"}}>{p.name}</div>
          <div style={{background:C2.a,borderRadius:"8px 8px 0 0",width:"100%",height:colHeights[colIdx],display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:8}}>
            <div style={{fontFamily:"Anton,Impact,sans-serif",fontSize:20,color:C2.bg}}>🍺 {p.total_slok||0}</div>
            <div style={{fontSize:10,color:C2.bg,opacity:.8}}>slokken</div>
          </div>
          <div style={{fontFamily:"Anton,Impact,sans-serif",fontSize:22,color:C2.a,textAlign:"center"}}>{rankMedals[pos]}</div>
        </div>;
      })}
    </div>

    <div className="neon-lbl mb12">VOLLEDIGE RANGLIJST</div>
    {sorted.map((p,i)=>{
      const C2=COLORS[p.color]||COLORS.groen;
      const bingoCount=(p.bingo_lines||[]).length;
      return <div key={p.id} className="p-row" style={{borderColor:p.id===me.id?C.a:"#1e1e1e"}}>
        <div style={{fontFamily:"Anton,Impact,sans-serif",fontSize:20,color:"#555",width:24,textAlign:"center"}}>{i+1}</div>
        <PlayerAvatar p={p}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700}}>{p.name}</div>
          <div style={{fontSize:11,color:"#555"}}>
            {bingoCount>0&&`🏆 ${bingoCount} bingo · `}🍺 {p.total_slok||0} slokken
          </div>
        </div>
      </div>;
    })}

    <div style={{display:"flex",gap:10,marginTop:24}}>
      {me.is_host&&<button className="btn btn-ghost flex1" onClick={onRematch}>🔄 Nieuwe Ronde</button>}
      <button className="btn btn-green flex1" onClick={onHome}>🏠 Home</button>
    </div>
  </div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("loading");
  const [authUser,setAuthUser]=useState(null);
  const [pwRecovery,setPwRecovery]=useState(false);
  const [sess,setSess]=useState(null);
  const [players,setPlayers]=useState([]);
  const [me,setMe]=useState(null);
  const [joinCode,setJoinCode]=useState("");
  const [foundSess,setFoundSess]=useState(null);
  const {toasts,add:addToast}=useToasts();
  const chRef=useRef(null);

  // Restore active session for logged-in user (called after login)
  async function tryRestoreSession(user){
    if(!user)return false;
    try{
      const{data:rows}=await sb.from("wk_players")
        .select("*, wk_sessions!inner(*)")
        .eq("user_id",user.id)
        .neq("wk_sessions.status","finished")
        .order("created_at",{ascending:false})
        .limit(1);
      const row=rows?.[0];
      if(!row)return false;
      const sessionData=row.wk_sessions;
      const{data:allPlayers}=await sb.from("wk_players").select("*").eq("session_id",sessionData.id);
      setSess(sessionData);
      setPlayers(allPlayers||[row]);
      setMe(row);
      if(sessionData.status==="active"){setScreen("play");}
      else if(sessionData.status==="lobby"&&row.is_host){setScreen("lobby");}
      else{setScreen("wait");}
      return true;
    }catch(e){return false;}
  }

  // Auth + URL param
  useEffect(()=>{
    const p=new URLSearchParams(location.search);
    const j=p.get("join");
    if(j)setJoinCode(j);

    // Handle password recovery link
    const hash=window.location.hash;
    if(hash.includes("type=recovery")){
      setPwRecovery(true);
      history.replaceState(null,"",window.location.pathname+window.location.search);
    }

    sb.auth.getSession().then(async({data})=>{
      const user=data.session?.user||null;
      setAuthUser(user);
      if(hash.includes("type=recovery")){setScreen("login");return;}
      if(j){setScreen("join");return;}
      if(user){
        const restored=await tryRestoreSession(user);
        if(!restored)setScreen("home");
      } else {
        setScreen("login");
      }
    });

    const{data:{subscription}}=sb.auth.onAuthStateChange((event,s)=>{
      const user=s?.user||null;
      setAuthUser(user);
      if(event==="PASSWORD_RECOVERY"){
        setPwRecovery(true);
        setScreen("login");
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function handleLogin(user){
    setAuthUser(user);
    const restored=await tryRestoreSession(user);
    if(!restored)setScreen("home");
  }

  async function handleLogout(){
    await sb.auth.signOut();
    setAuthUser(null);
    goHome();
    setScreen("login");
  }

  // Lobby realtime (when host is in lobby)
  useEffect(()=>{
    if(screen!=="lobby"||!sess)return;
    const ch=sb.channel("wk-lobby-"+sess.id)
      .on("postgres_changes",{event:"*",schema:"public",table:"wk_players",filter:`session_id=eq.${sess.id}`},({new:nr,old:or,eventType})=>{
        if(eventType==="DELETE"){setPlayers(p=>p.filter(x=>x.id!==or?.id));return;}
        setPlayers(prev=>{
          const i=prev.findIndex(p=>p.id===nr.id);
          return i===-1?[...prev,nr]:prev.map((p,ii)=>ii===i?nr:p);
        });
      })
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"wk_sessions",filter:`id=eq.${sess.id}`},({new:ns})=>{
        setSess(ns);
        if(ns.status==="active"){
          const myPlayer=players.find(p=>p.is_host);
          if(myPlayer){setMe(myPlayer);setScreen("play");}
        }
      })
      .subscribe();
    chRef.current=ch;
    return()=>{sb.removeChannel(ch);};
  },[screen,sess?.id]);

  // Wait screen realtime
  useEffect(()=>{
    if(screen!=="wait"||!sess||!me)return;
    const ch=sb.channel("wk-wait-"+sess.id)
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"wk_sessions",filter:`id=eq.${sess.id}`},({new:ns})=>{
        setSess(ns);
        if(ns.status==="active"){setScreen("play");}
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"wk_players",filter:`session_id=eq.${sess.id}`},({new:nr,eventType,old:or})=>{
        if(eventType==="DELETE"){setPlayers(p=>p.filter(x=>x.id!==or?.id));return;}
        setPlayers(prev=>{
          const i=prev.findIndex(p=>p.id===nr.id);
          return i===-1?[...prev,nr]:prev.map((p,ii)=>ii===i?nr:p);
        });
      })
      .subscribe();
    return()=>{sb.removeChannel(ch);};
  },[screen,sess?.id,me?.id]);

  function goHome(){
    setSess(null);setPlayers([]);setMe(null);setFoundSess(null);
    if(chRef.current){sb.removeChannel(chRef.current);chRef.current=null;}
    setScreen("home");
  }

  async function handleRematch(){
    if(!sess||!me)return;
    // Reset session
    await sb.from("wk_sessions").update({status:"lobby",goal_count:0,host_alert:null}).eq("id",sess.id);
    // Refresh players
    const{data:ps}=await sb.from("wk_players").select("*").eq("session_id",sess.id);
    if(ps){
      // reset all players
      await Promise.all(ps.map(p=>sb.from("wk_players").update({counts:Array(sess.grid_size*sess.grid_size).fill(0),bingo_lines:[],total_slok:0,achievements:[]}).eq("id",p.id)));
      setPlayers(ps);
    }
    setSess(prev=>({...prev,status:"lobby",goal_count:0}));
    const myP=me.is_host?{...me,counts:Array(sess.grid_size*sess.grid_size).fill(0),bingo_lines:[],total_slok:0}:me;
    setMe(myP);
    setScreen("lobby");
  }

  // Render
  if(screen==="loading") return <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div className="spin"/>
  </div>;

  if(screen==="login") return <>
    <LoginScreen onLogin={handleLogin} pwRecovery={pwRecovery} onPwRecoveryDone={()=>setPwRecovery(false)}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="home") return <>
    <HomeScreen authUser={authUser} onCreate={()=>setScreen("create")}
      onJoin={c=>{setJoinCode(c);setScreen("join");}}
      onAdmin={()=>authUser?.email===ADMIN_EMAIL?setScreen("admin"):setScreen("admin-login")} joinCode={joinCode}
      onLogout={handleLogout}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="admin-login") return <>
    <AdminLoginScreen onBack={()=>{setPwRecovery(false);setScreen("home");}}
      onSuccess={u=>{setAuthUser(u);setScreen("admin");}}
      pwRecovery={pwRecovery} onPwRecoveryDone={()=>setPwRecovery(false)}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="admin") return <>
    <AdminPanelScreen user={authUser} onBack={()=>setScreen("home")}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="create") return <>
    <CreateSessionScreen onBack={()=>setScreen("home")} authUser={authUser}
      onCreate={(s,p)=>{setSess(s);setPlayers([p]);setMe(p);setScreen("lobby");}}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="lobby") return <>
    <HostLobbyScreen sess={sess} players={players} me={me}
      onStart={()=>{const p=players.find(x=>x.id===me.id);if(p)setMe(p);setScreen("play");}}
      onUpdate={s=>setSess(s)} onEnd={goHome} addToast={(m,c)=>addToast(m,{color:c})}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="join") return <>
    <JoinScreen initCode={joinCode} onBack={()=>setScreen("home")}
      onFound={s=>{setFoundSess(s);setScreen("player-setup");}}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="player-setup") return <>
    <PlayerSetupScreen sess={foundSess} onBack={()=>setScreen("join")} authUser={authUser}
      onJoin={async(p)=>{
        setSess(foundSess);
        const{data:ps}=await sb.from("wk_players").select("*").eq("session_id",foundSess.id);
        setPlayers(ps||[p]);setMe(p);
        // if session has predictions, show predictions screen first
        if((foundSess.predictions_config||[]).length>0){setScreen("predictions");}
        else setScreen("wait");
      }}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="predictions") return <>
    <PredictionsScreen sess={sess||foundSess} player={me}
      onDone={()=>setScreen("wait")}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="wait") return <>
    <WaitScreen sess={sess} players={players} me={me}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="play") return <>
    <PlayScreen sess={sess} players={players} me={me}
      onEnd={()=>{
        sb.from("wk_players").select("*").eq("session_id",sess.id).then(({data})=>{
          if(data)setPlayers(data);
        });
        setScreen("winner");
      }}
      addToast={(m,opts)=>addToast(m,typeof opts==="string"?{color:opts}:opts)}/>
    <ToastList toasts={toasts}/>
  </>;

  if(screen==="winner") return <>
    <WinnerScreen sess={sess} players={players} me={me} onHome={goHome} onRematch={handleRematch}/>
    <ToastList toasts={toasts}/>
  </>;

  return null;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
